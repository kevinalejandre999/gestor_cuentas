version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: gestor_cuentas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestor_password}
      POSTGRES_DB: ${POSTGRES_DB:-gestor_cuentas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestor_user} -d ${POSTGRES_DB:-gestor_cuentas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gestor_cuentas_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://gestor_user:gestor_password@db:5432/gestor_cuentas}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
